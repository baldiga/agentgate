databases:
  - name: agentgate-postgres
    databaseName: agentgate
    user: agentgate
    plan: free
    region: frankfurt

services:
  - type: redis
    name: agentgate-redis
    plan: free
    region: frankfurt
    maxmemoryPolicy: noeviction

  - type: web
    name: agentgate-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: free
    region: frankfurt
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agentgate-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: agentgate-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: AGENTGATE_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          type: web
          name: agentgate-web
          property: hostWithScheme

  - type: web
    name: agentgate-web
    runtime: docker
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: .
    plan: free
    region: frankfurt
    buildArgs:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: agentgate-api
          property: hostWithScheme
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: agentgate-api
          property: hostWithScheme
